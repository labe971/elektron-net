name: Build Elektron Headless
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git g++-mingw-w64-x86-64 python3

      - name: Fix Permissions
        run: chmod -R +x .

      - name: Build Depends (NO QT)
        run: |
          cd depends
          # Disabilitiamo completamente QT e le librerie grafiche
          make HOST=x86_64-w64-mingw32 NO_QT=1 NO_QR=1 -j$(nproc)
          cd ..

      - name: Build Wallet (Daemon Only)
        run: |
          ./autogen.sh
          # Configurazione senza interfaccia grafica
          ./configure --prefix=$(pwd)/depends/x86_64-w64-mingw32 --without-gui --without-miniupnpc --disable-tests --disable-bench --enable-reduce-exports
          make -j$(nproc)

      - name: Prepare Artifact
        run: |
          mkdir release
          cp src/elektrond.exe release/
          cp src/elektron-cli.exe release/

      - name: Upload Wallet
        uses: actions/upload-artifact@v4
        with:
          name: Elektron-Headless-Windows
          path: release/
