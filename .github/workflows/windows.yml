name: Build Elektron Windows
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git g++-mingw-w64-x86-64 python3

      - name: Fix Permissions
        run: chmod -R +x .

      - name: Build Depends (Qt5)
        run: |
          cd depends
          # Forziamo l'uso di Qt5 che è più compatibile
          make HOST=x86_64-w64-mingw32 NO_QT=1 -j$(nproc)
          # Ora proviamo a compilare solo il necessario per l'interfaccia
          make HOST=x86_64-w64-mingw32 -j$(nproc)
          cd ..

      - name: Build Wallet
        run: |
          ./autogen.sh
          # Usiamo flag di compatibilità per evitare l'errore SEH
          export CXXFLAGS="-fno-asynchronous-unwind-tables"
          ./configure --prefix=$(pwd)/depends/x86_64-w64-mingw32 --disable-tests --disable-bench --enable-reduce-exports --with-gui=qt5
          make -j$(nproc)

      - name: Prepare Artifact
        run: |
          mkdir release
          cp src/qt/elektron-qt.exe release/ || true
          cp src/elektrond.exe release/ || true

      - name: Upload Wallet
        uses: actions/upload-artifact@v4
        with:
          name: Elektron-Windows-Wallet
          path: release/
