name: Build Elektron Headless
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Force Clone
        run: |
          rm -rf *
          # Ricostruiamo l'URL a pezzi così non viene tagliato
          PART1="https://github.com"
          PART2="/kutlusoy/elektron.git"
          git clone "$PART1$PART2" .
          git checkout master

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git g++-mingw-w64-x86-64 python3

      - name: Build Depends (NO QT)
        run: |
          chmod -R +x .
          cd depends
          make HOST=x86_64-w64-mingw32 NO_QT=1 -j$(nproc)
          cd ..

      - name: Build Wallet (Daemon Only)
        run: |
          chmod +x autogen.sh
          ./autogen.sh
          ./configure --prefix=$(pwd)/depends/x86_64-w64-mingw32 --without-gui --disable-tests --disable-bench --enable-reduce-exports
          make -j$(nproc)

      - name: Prepare Artifact
        run: |
          mkdir release
          cp src/elektrond.exe release/ || true
          cp src/elektron-cli.exe release/ || true

      - name: Upload Wallet
        uses: actions/upload-artifact@v4
        with:
          name: Elektron-Headless-Windows
          path: release/
